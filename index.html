<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CogniQuest - Game</title>
    <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="cq-app">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <!-- LEFT SIDEBAR -->
    <div class="sidebar-left">
      <a href="mem start.html" class="header-link">
        <div class="logo">Cogni<span>Quest</span></div>
        <div class="logo-sub">Memory Card Game</div>
      </a>

      <div class="divider"></div>

      <div>
        <div class="section-label">Images</div>
        <button class="upload-btn" id="upload-btn" onclick="document.getElementById('image-upload').click()">⊕ &nbsp;Upload Images</button>
        <input type="file" id="image-upload" multiple accept="image/*" style="display:none;">
      </div>

      <div>
        <div class="section-label">Grid Size</div>
        <div class="btn-group">
          <button class="opt-btn seg-btn active" id="easyBtn" data-val="8">2×4 <span class="badge">8 cards</span></button>
          <button class="opt-btn seg-btn" id="mediumBtn" data-val="10">2×5 <span class="badge">10 cards</span></button>
          <button class="opt-btn seg-btn" id="hardBtn" data-val="12">2×6 <span class="badge">12 cards</span></button>
        </div>
      </div>

      <div>
        <div class="section-label">Preview Time</div>
        <div class="btn-group">
          <button class="opt-btn time-btn" data-time="2000">2 seconds</button>
          <button class="opt-btn time-btn active" data-time="3000">3 seconds</button>
          <button class="opt-btn time-btn" data-time="4000">4 seconds</button>
        </div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="board-area">
        <div class="board" id="board"></div>
        <div class="progress-row">
          <div class="progress-meta">
            <span>Progress</span>
            <span id="progress-text">0 of 4 pairs matched</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar-right">
      <div class="stat-card timer">
        <div class="s-label">Time</div>
        <div class="s-value" id="timer">0:00</div>
        <div class="s-sub">elapsed</div>
      </div>
      <div class="stat-card errors">
        <div class="s-label">Errors</div>
        <div class="s-value" id="errors">0</div>
        <div class="s-sub">mistakes made</div>
      </div>
      <div class="stat-card matched">
        <div class="s-label">Matched</div>
        <div class="s-value"><span id="matches">0</span>/<span id="total-matches">0</span></div>
        <div class="s-sub">pairs found</div>
      </div>
      <div class="stat-card score">
        <div class="s-label" style="display: flex; justify-content: space-between; align-items: center;">
          Score
          <span class="info-icon" data-tooltip="Calculation:&#10;Base: Pairs × 150&#10;Penalty: -20 per Error&#10;Time Bonus: Max(0, 300 - Time × 2)">ℹ️</span>
        </div>
        <div class="s-value" id="score">—</div>
        <div class="s-sub">this round</div>
      </div>

      <div class="win-card" id="game-end">
        <div class="win-title">🎉 All matched!</div>
        <div class="win-sub">Great memory — play again?</div>
        <div class="win-stats-mini">
          <span style="color:#a78bfa;">⏱ Time: <strong id="win-time">—</strong></span>
          <span style="color:#f87171;">❌ <strong id="win-errors">—</strong> errors</span>
          <span style="color:#4ade80;">⭐ Score: <strong id="win-score">—</strong></span>
        </div>
        <button class="play-again" onclick="resetGame()">Play Again</button>
      </div>

      <div class="bottom-actions">
        <button class="sound-btn" onclick="resetGame()">🔄 &nbsp;Restart Game</button>
        <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊 &nbsp;Sound On</button>
      </div>
    </div>
  </div>

  <audio id="bell-sound" src="assets/audio/bell2.mp3"></audio>
  <audio id="buzzer-sound" src="assets/audio/buzzer2.mp3"></audio>
  <audio id="swipe-sound" src="assets/audio/swipe.mp3"></audio>
  <audio id="win-sound" src="assets/audio/win.mp3"></audio>
  <script src="js/script.js"></script>
</body>
</html>
