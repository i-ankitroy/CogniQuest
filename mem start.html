<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/theme.css">
    <title>CogniQuest - Memory Card Game</title>
</head>
<body>
    <div class="landing-wrapper">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div class="orb orb-gaming"></div>

        <!-- Epic Floating 3D Cards Background -->
        <div class="floating-cards">
            <div class="float-card fc-1">
                <div class="cq-face cq-back"><div class="cq-back-pattern"></div><div class="cq-back-icon">CQ</div></div>
            </div>
            <div class="float-card fc-2">
                 <div class="cq-face cq-back"><div class="cq-back-pattern"></div><div class="cq-back-icon">CQ</div></div>
            </div>
            <div class="float-card fc-3">
                 <div class="cq-face cq-back"><div class="cq-back-pattern"></div><div class="cq-back-icon">CQ</div></div>
            </div>
            <div class="float-card fc-4">
                 <div class="cq-face cq-back"><div class="cq-back-pattern"></div><div class="cq-back-icon">CQ</div></div>
            </div>
        </div>

        <div class="landing-content">
            <div class="brand-badge">⚡ The Ultimate Memory Challenge</div>
            
            <h1 class="gaming-title">Cogni<span class="text-glow">Quest</span></h1>
            
            <div class="features-row">
                <div class="f-pill">🕒 Race the Clock</div>
                <div class="f-pill">🧠 Sharpen Focus</div>
                <div class="f-pill">📸 Custom Images</div>
            </div>

            <a href="index.html" class="play-btn-epic">
                <span class="btn-text">ENTER GAME</span>
                <div class="btn-glow"></div>
            </a>
        </div>
    </div>
</body>
</html>
